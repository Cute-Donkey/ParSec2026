name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM

jobs:
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Download Godot
      run: |
        wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
        unzip -q Godot_v4.6.2-stable_linux.x86_64.zip
        chmod +x Godot_v4.6.2-stable_linux.x86_64
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
        
    - name: Performance Test - Scene Loading
      run: |
        echo "⚡ Testing scene loading performance..."
        
        scenes=("scenes/prototypes/HeadlessPrototype.tscn" "scenes/game/SpaceSector.tscn")
        
        for scene in "${scenes[@]}"; do
          if [ -f "$scene" ]; then
            echo "Testing $scene..."
            
            # Measure loading time
            start_time=$(date +%s%N)
            timeout 30s ./Godot_v4.6.2-stable_linux.x86_64 --headless --quit "$scene"
            end_time=$(date +%s%N)
            
            duration=$(((end_time - start_time) / 1000000))
            echo "✅ $scene loaded in ${duration}ms"
            
            # Check if loading is reasonable (< 10 seconds)
            if [ $duration -gt 10000 ]; then
              echo "⚠️ $scene loading time is slow: ${duration}ms"
            fi
          else
            echo "⚠️ Scene $scene not found"
          fi
        done
    
    - name: Performance Test - Physics Simulation
      run: |
        echo "⚛️ Testing physics performance..."
        
        # Create performance test script
        cat > performance_test.gd << 'EOF'
extends Node

func _ready():
    print("⚛️ Physics performance test starting...")
    
    # Create multiple objects to test physics performance
    var objects = []
    var object_count = 50
    
    for i in range(object_count):
        var body = RigidBody3D.new()
        body.mass = 100.0
        body.gravity_scale = 0.0
        body.position = Vector3(randf_range(-20, 20), randf_range(-20, 20), randf_range(-20, 20))
        
        var shape = CollisionShape3D.new()
        var sphere = SphereShape3D.new()
        sphere.radius = 1.0
        shape.shape = sphere
        body.add_child(shape)
        
        add_child(body)
        objects.append(body)
    
    print("✅ Created ", object_count, " physics objects")
    
    # Run physics simulation for 2 seconds
    await get_tree().create_timer(2.0).timeout
    
    # Check performance
    var fps = Engine.get_frames_per_second()
    print("📊 FPS: ", fps)
    
    if fps < 30:
        print("⚠️ Low FPS detected: ", fps)
    elif fps >= 60:
        print("✅ Good FPS: ", fps)
    else:
        print("📈 Acceptable FPS: ", fps)
    
    # Cleanup
    for obj in objects:
        obj.queue_free()
    
    print("✅ Physics performance test completed")
    get_tree().quit(0)
EOF
        
        # Run performance test
        timeout 30s ./Godot_v4.6.2-stable_linux.x86_64 --headless --quit --script performance_test.gd
    
    - name: Memory Usage Test
      run: |
        echo "💾 Testing memory usage..."
        
        # Monitor memory during scene loading
        timeout 30s /usr/bin/time -v ./Godot_v4.6.2-stable_linux.x86_64 --headless --quit scenes/prototypes/HeadlessPrototype.tscn > memory_output.txt 2>&1 || true
        
        # Extract memory usage
        if grep -q "Maximum resident set size" memory_output.txt; then
            memory_kb=$(grep "Maximum resident set size" memory_output.txt | awk '{print $6}')
            memory_mb=$((memory_kb / 1024))
            echo "💾 Peak memory usage: ${memory_mb}MB"
            
            if [ $memory_mb -gt 500 ]; then
                echo "⚠️ High memory usage: ${memory_mb}MB"
            else
                echo "✅ Acceptable memory usage: ${memory_mb}MB"
            fi
        else
            echo "ℹ️ Could not extract memory usage"
        fi
    
    - name: Performance Report
      run: |
        echo "📊 Performance Test Summary"
        echo "=========================="
        echo "✅ Scene loading tests completed"
        echo "✅ Physics simulation tests completed"
        echo "✅ Memory usage tests completed"
        echo ""
        echo "Performance is within acceptable ranges for Phase 2 prototype."
